serial: yes
timeout: 3

# Single entry works for both BIOS and UEFI — Limine selects the loader based
# on how firmware called it (limine-bios.sys vs BOOTX64.EFI). The kernel reads
# MEMORY_MAP_REQUEST, HHDM_REQUEST, and FRAMEBUFFER_REQUEST from Limine and is
# protocol-agnostic.
/sotX
    protocol: limine
    resolution: 1024x768x32
    kernel_path: boot():/boot/sotos-kernel
    module_path: boot():/boot/initrd.img
