[workspace]
resolver = "2"
members = [
    "kernel",
    "libs/sotos-common",
    "libs/sotos-pci",
    "libs/sotos-virtio",
    "libs/sotos-objstore",
]
exclude = [
    "services/init",
    "services/lucas-shell",
    "services/kbd",
]

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
lto = true
opt-level = 2
