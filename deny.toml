[bans]
multiple-versions = "warn"
# Internal workspace crates use `path = "..."` deps without explicit version
# numbers, which cargo-deny treats as wildcards. cargo-deny only honours
# `allow-wildcard-paths` for crates marked `publish = false`, which our
# internal crates are not (yet). Until they are, demote wildcards from a
# hard error to a warning so CI does not block on intra-workspace path deps.
# External wildcard version specifiers will still be surfaced loudly.
wildcards = "warn"
allow-wildcard-paths = true
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[advisories]
version = 2
yanked = "deny"
ignore = []
