[[licenses.clarify]]
crate = "sotos-xhci"
expression = "MIT OR Apache-2.0"
license-files = []

[bans]
multiple-versions = "warn"
# wildcards: cargo-deny only honors `allow-wildcard-paths` for crates marked
# `publish = false`. None of our workspace crates declare that yet, so a
# strict `deny` here would block legitimate intra-workspace `path = "..."`
# deps (which cargo-deny classifies as wildcards because they have no
# version field). Demote to "warn" until every sotos-* crate sets
# `publish = false` in its Cargo.toml; then restore this to "deny" so
# external wildcard version specifiers are hard-failed.
# TODO(ci/audit-deny): mark workspace crates `publish = false` and flip
# this back to "deny".
wildcards = "warn"
allow-wildcard-paths = true
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[advisories]
version = 2
yanked = "deny"
ignore = []
