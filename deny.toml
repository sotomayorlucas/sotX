[licenses]
version = 2
confidence-threshold = 0.93
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "0BSD",
]
exceptions = []
unused-allowed-license = "allow"

# First-party (workspace) crates do not declare a license field because they
# are never published to crates.io. Clarify them as MIT OR Apache-2.0 (the
# default Rust ecosystem dual license) so cargo-deny does not treat them as
# unlicensed third-party dependencies.
[[licenses.clarify]]
crate = "sotos-ahci"
expression = "MIT OR Apache-2.0"
license-files = []

[[licenses.clarify]]
crate = "sotos-audio"
expression = "MIT OR Apache-2.0"
license-files = []

[[licenses.clarify]]
crate = "sotos-common"
expression = "MIT OR Apache-2.0"
license-files = []

[[licenses.clarify]]
crate = "sotos-gui"
expression = "MIT OR Apache-2.0"
license-files = []

[[licenses.clarify]]
crate = "sotos-kernel"
expression = "MIT OR Apache-2.0"
license-files = []

[[licenses.clarify]]
crate = "sotos-ld"
expression = "MIT OR Apache-2.0"
license-files = []

[[licenses.clarify]]
crate = "sotos-lua"
expression = "MIT OR Apache-2.0"
license-files = []

[[licenses.clarify]]
crate = "sotos-mouse"
expression = "MIT OR Apache-2.0"
license-files = []

[[licenses.clarify]]
crate = "sotos-nvme"
expression = "MIT OR Apache-2.0"
