\* TLC config for chase_lev.tla
\*
\* Bounded model: 1 owner + 2 thieves, deque of capacity 3,
\* a value pool of 4, and at most 4 total pushes.  This exercises
\* the single-element pop/steal race (the canonical Chase-Lev hazard)
\* without exploding state space.
\*
\* Run with:
\*   tlc formal/chase_lev.tla -config formal/chase_lev.cfg

SPECIFICATION FairSpec

CONSTANTS
    Owner   = O1
    Thieves = {T1}
    Cap     = 2
    Values  = {V1, V2}
    MaxPushes = 2

INVARIANTS
    TypeInv
    Consistency
    NoLostTask
    NoDuplicateTask
    NoSpuriousSteal

PROPERTIES
    TaskEventuallyRuns

CONSTRAINT
    StateBound

CHECK_DEADLOCK FALSE
