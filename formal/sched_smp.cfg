\* TLC config for sched_smp.tla — PATCHED mode (R1 fix verified).
\*
\* AddressingMode = "lapic_id" exercises the FIXED enqueue path
\* (`lapic::send_ipi(LapicId(target_lapic), ...)`). Under this mode TLC
\* must report 0 invariant violations and 0 temporal property failures.
\*
\* Run:  java -cp tools/tlc.jar tlc2.TLC -workers auto sched_smp
\*       (cwd = formal/)
\*
\* The companion config sched_smp_legacy.cfg exercises AddressingMode =
\* "cpu_index" — under that config TLC MUST report a NoLostWake
\* counterexample, which is the proof that the spec catches R1.

SPECIFICATION FairSpec

CONSTANTS
    CPUs            = {"C1", "C2"}
    Threads         = {Th1}
    AddressingMode  = "lapic_id"

INVARIANTS
    TypeInv
    SingleExecution
    QueueConsistency
    MutualExclusion

PROPERTIES
    NoLostWake

CHECK_DEADLOCK FALSE
