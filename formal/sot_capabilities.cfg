\* TLC config for sot_capabilities.tla
\* Tier 5: real model checking. Constants are tiny -- the spec's Rights
\* powerset (2^5 = 32) plus the cross product over caps and domains
\* explodes the state space. With Domains=1, Caps=2, MaxOps=3 we
\* exhaustively explore in seconds.

SPECIFICATION Spec

CONSTANTS
    Domains = {D1}
    Caps = {C1, C2}
    MaxOps = 3

INVARIANTS
    TypeInvariant
    NoEscalation
    AttenuationOnly

CONSTRAINT
    OpsBound

CHECK_DEADLOCK FALSE
