\* TLC config for sched_smp.tla — LEGACY (R1-buggy) mode.
\*
\* AddressingMode = "cpu_index" exercises the LEGACY enqueue path that
\* the kernel had before the April 2026 R1 fix:
\* `lapic::send_ipi(target as u32, ...)` — passing the logical CPU
\* index directly into ICR_HI as the physical destination LAPIC ID.
\*
\* TLC MUST produce a NoLostWake counterexample under this config.
\* The trace will show the IPI being delivered to no CPU (because
\* no real CPU has LAPIC 1 or 2) and the woken thread sitting in its
\* run queue forever — the precise R1 hazard.
\*
\* The "must produce a counterexample" expectation is the proof that
\* the spec is *sensitive* to the actual bug, not vacuously true.
\*
\* Run:  cp sched_smp_legacy.cfg sched_smp.cfg && tlc sched_smp
\*       (or use a model file with this config explicitly)

SPECIFICATION FairSpec

CONSTANTS
    CPUs            = {"C1", "C2"}
    Threads         = {Th1}
    AddressingMode  = "cpu_index"

INVARIANTS
    TypeInv
    SingleExecution
    QueueConsistency
    MutualExclusion

PROPERTIES
    NoLostWake

CHECK_DEADLOCK FALSE
