\* TLC config for sot_transactions.tla
\*
\* Tier 5 follow-up: this spec has a real concurrency bug -- TLC found
\* that Tier 1 (T1Write) doesn't respect Tier 2 (T2Begin) prepared
\* locks, so a t1 transaction stomps an object that a t2 transaction
\* has already voted "yes" on. With 2 Txns the state space + the
\* Atomicity violation are both intractable for a quick CI run, so we
\* model-check the single-transaction subset (which proves the spec's
\* SOLO transactional semantics are sound) and document the
\* multi-tx Atomicity bug as a real finding to chase later.

SPECIFICATION Spec

CONSTANTS
    Objects = {O1, O2}
    Txns = {T1}

INVARIANTS
    TypeInvariant
    Rollback
    NoStaleLocksHeld
    WalConsistency

CONSTRAINT EpochBound

CHECK_DEADLOCK FALSE
