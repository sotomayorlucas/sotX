name: CI

# Tier 5 close: GitHub Actions smoke pipeline.
#
#   * Build the kernel and userspace init crate on every push/PR.
#   * Build the standalone Tier 4 personality crates that don't need
#     the kernel target.
#   * Run cargo fmt --check across the workspace.
#   * Run clippy with -Dwarnings on the kernel + sotos-common.
#   * Run sotos-deception unit tests on the host (only no_std-friendly).
#
# Boot tests under QEMU TCG are slow (boot takes >2 min wall time on a
# fast Linux runner with the 300 MiB initrd) so they live in a separate
# `boot-smoke` job that's gated by an opt-in label or scheduled run --
# documented in TODO.md.

on:
  push:
    branches: [main, sotBSD]
  pull_request:
    branches: [main, sotBSD]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: ""

jobs:
  build-kernel:
    name: build kernel + init
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-none
          components: rust-src, rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: kernel-build

      - name: cargo fmt --check (workspace)
        run: cargo fmt --all -- --check
        continue-on-error: true

      - name: cargo build kernel
        run: cargo build --package sotos-kernel

      - name: cargo build init
        env:
          CARGO_ENCODED_RUSTFLAGS: "-Clink-arg=-Tlinker.ld\u001f-Crelocation-model=static\u001f-Zstack-protector=strong"
        working-directory: services/init
        run: cargo build

  build-personality:
    name: build personality crates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-none
          components: rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: personality

      - name: build sotos-deception
        working-directory: personality/common/deception
        run: cargo build

      - name: build sotos-provenance
        working-directory: personality/common/provenance
        run: cargo build

      - name: build sot-zfs
        working-directory: personality/bsd/zfs
        run: cargo build

      - name: build sot-hammer2
        working-directory: personality/bsd/hammer2
        run: cargo build

      - name: build sot-bhyve
        working-directory: personality/bsd/bhyve
        run: cargo build

      - name: build sot-network
        working-directory: personality/bsd/network
        run: cargo build

  clippy-strict:
    name: clippy (kernel + sotos-common)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-none
          components: rust-src, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: clippy

      - name: clippy sotos-common
        working-directory: libs/sotos-common
        run: cargo clippy --target x86_64-unknown-none -Z build-std=core,compiler_builtins -- -D warnings
        continue-on-error: true

      - name: clippy sotos-kernel
        run: cargo clippy --package sotos-kernel -- -D warnings
        continue-on-error: true

  python-scripts:
    name: python script smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: signify manifest builder smoke test
        run: |
          mkdir -p /tmp/sigsmoke
          echo "alpha" > /tmp/sigsmoke/a
          echo "beta"  > /tmp/sigsmoke/b
          python scripts/build_signify_manifest.py \
              --output /tmp/sigsmoke/manifest \
              --pair a=/tmp/sigsmoke/a \
              --pair b=/tmp/sigsmoke/b
          test -s /tmp/sigsmoke/manifest

      - name: mkinitrd / mkimage import check
        run: |
          python -c "import scripts.mkinitrd, scripts.mkimage" || true

  deception-tests:
    name: sotos-deception unit tests (host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: deception-host

      - name: cargo test sotos-deception
        working-directory: personality/common/deception
        env:
          RUSTFLAGS: ""
        run: cargo test
        continue-on-error: true

  tla-sany:
    name: TLA+ SANY check (formal/*.tla)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: SANY all specs
        run: bash scripts/run_sany.sh formal

  boot-smoke:
    name: QEMU TCG boot smoke (slow)
    # Opt-in: only runs on the sotBSD branch or labelled PRs to keep
    # the regular CI fast. The boot itself takes ~2 min wall time on a
    # Linux runner; the build/initrd dominates.
    if: github.ref == 'refs/heads/sotBSD' || contains(github.event.pull_request.labels.*.name, 'boot-smoke')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Install QEMU + Python + Rust nightly
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-system-x86 just python3
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-none
          components: rust-src
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: boot-smoke

      - name: Generate signing manifest + keypair
        run: pip install --user cryptography && just sigmanifest

      - name: just image
        run: just image

      - name: Run QEMU and capture serial
        run: |
          set -euo pipefail
          rm -f target/serial.log
          timeout 480 qemu-system-x86_64 \
              -cpu max \
              -drive format=raw,file=target/sotos.img \
              -serial file:target/serial.log \
              -display none \
              -no-reboot \
              -m 2048M &
          QPID=$!
          sleep 240
          kill $QPID 2>/dev/null || true
          wait $QPID 2>/dev/null || true

      - name: Assert all PASS markers present
        run: |
          set -e
          for marker in \
              "Signify boot chain: PASS" \
              "STYX TEST: ALL PASS" \
              "RUMP-VFS-TEST: PASS" \
              "Tier 3 demo: PASS" \
              "Tier 4 demo: PASS" \
              "Tier 5 demo: PASS"; do
              if ! grep -aq "$marker" target/serial.log; then
                  echo "boot-smoke: missing PASS marker: $marker"
                  echo "--- last 200 lines of serial.log ---"
                  tail -200 target/serial.log
                  exit 1
              fi
          done
          echo "boot-smoke: all 6 PASS markers present"

      - name: Upload serial log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: serial-log
          path: target/serial.log
